name: Build da Aplicação no Windows

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ main ]

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle' # Distribuição estável e recomendada
          cache: 'gradle'

      - name: Compilar e Reunir Módulos
        shell: pwsh
        run: |
          .\gradlew clean
          .\gradlew copyDependencies

      - name: Executar jpackage Nativo com jlink
        shell: pwsh
        run: |
          jpackage `
          --type app-image `
          --dest build/windows `
          --name "BatchProcessor" `
          --runtime-image "${env:JAVA_HOME}" `
          --module-path "build/libs" `
          --module br.com.getronics/br.com.getronics.Main `
          --win-console `
          --java-options "-Djavafx.verbose=false -Dprism.verbose=false -Dprism.text=native -Dprism.lcdtext=true --enable-native-access=javafx.graphics"

      - name: Disponibilizar o executável para Download
        uses: actions/upload-artifact@v4
        with:
          name: BatchProcessor-Win
          path: build/windows/**