name: Build da Aplicação no Windows

# Define o que vai disparar a máquina virtual
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  meu-job-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar o JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'oracle' # Distribuição estável e recomendada
          cache: 'gradle'

      # Gera o Fat JAR:
      - name: Criar Fat JAR
        run: .\gradlew fatJar

      - name: Executar jpackage Nativo
        run: |
          jpackage --type app-image `
                   --dest build/windows 
                   --name "BatchProcessor" `
                   --main-jar (Get-ChildItem build/libs/*.jar | Select-Object -First 1 -ExpandProperty Name) `
                   --main-class br.com.getronics.core.Main `
                   --input build/libs/ `
                   --win-console

      - name: Disponibilizar o executável para Download
        uses: actions/upload-artifact@v4
        with:
          name: BatchProcessor-Win
          path: build/windows/